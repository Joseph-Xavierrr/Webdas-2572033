<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - 2572033</title>

    <style>
        body{
            background-color: #ddd;
        }
        .main{
            background-color: white;
            padding: 12px;
            width: 500px;
            margin: auto;
            border-radius: 10px;
        }
        h3{
            margin-bottom: -2px;
        }
        select{
            width: 470px;
            height: 30px;
            padding: 5px;
        }
        input{
            width: 455px;
            height: 17px;
            padding: 5px;
        }
        .konversi{
            padding: 1px 8px;
            background-color: whitesmoke;
            margin-top: 12px;
            border-radius: 5px;
        }

    </style>
</head>

<body>
    <div class="main">
        <h1>Temperature Calculator</h1>
        <h3>Dari suhu:</h3>
        <select id="tipe">
            <option value="cel">Celsius (°C)</option>
            <option value="fah">Fahrenheit (°F)</option>
            <option value="kel">Kelvin (K)</option>
        </select>
        <h3>Nilai</h3>
        <input type="number" placeholder="Masukan angka..." value="suhu" id="tempe">
        <div class="konversi">
            <h3>Hasil konversi</h3>
            <p id="hasil">Masukan nilai untuk melihat hasil</p>
        </div>
        <h3>&copy; 2026 2572033 - Joseph Xavier Tan. All rights reserved</h3>
    </div>

    <script>

        function calculate() {
            var jenis = document.getElementById("tipe").value;
            var temp = document.getElementById("tempe").value;
            var c, f, k;

            temp = parseFloat(temp)

            if (isNaN(temp)) {
                alert("Value must not be empty");
                document.getElementById("hasil").innerText = `Masukan nilai untuk melihat hasil`;
                return;
            }

            if (jenis == "fah") {
                let pbaru1 = document.createElement("p");
                let pbaru2 = document.createElement("p");
                let pparent = document.getElementById("hasil");
                document.getElementById("hasil").innerText = `Celsius: ` + ((temp - 32) * 5 / 9);
                pbaru1.innerText = `Fahrenheit: ` + temp
                pbaru2.innerText = `Kelvin: ` + (((temp - 32) * 5 / 9) + 273)
                pparent.append(pbaru1);
                pparent.append(pbaru2);
            }
            if (jenis == "kel") {
                let pbaru1 = document.createElement("p");
                let pbaru2 = document.createElement("p");
                let pparent = document.getElementById("hasil");
                document.getElementById("hasil").innerText = `Celsius: ` + (temp - 273);
                pbaru1.innerText = `Fahrenheit: ` + (((temp - 273) * 9 / 5) + 32)
                pbaru2.innerText = `Kelvin: ` + temp
                pparent.append(pbaru1);
                pparent.append(pbaru2);
            }
            if (jenis == "cel") {
                let pbaru1 = document.createElement("p");
                let pbaru2 = document.createElement("p");
                let pparent = document.getElementById("hasil");
                document.getElementById("hasil").innerText = `Celsius: ` + temp;
                pbaru1.innerText = `Fahrenheit: ` + (((temp * 9) / 5) + 32)
                pbaru2.innerText = `Kelvin: ` + (temp + 273)
                pparent.append(pbaru1);
                pparent.append(pbaru2);
            }

        }
        // Penggunakan event Listener 
        document.getElementById("tipe").addEventListener('input', calculate);
        document.getElementById("tempe").addEventListener('change', calculate); 
    </script>
</body>

</html>
