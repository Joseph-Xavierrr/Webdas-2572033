<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game-2572033</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        #message {
            text-align: center;
            padding: 10px;
            font-size: 1.5rem;
            height: 60px;
        }

        .stats {
            text-align: center;
            color: #ffeb3b;
            font-size: 1.2rem;
        }

        .output {
            width: 100vw;
            height: calc(100vh - 150px);
            position: relative;
        }

        .box {
            width: 100px;
            height: 100px;
            position: absolute;
            display: none;
            cursor: pointer;
            border: 1px solid white;
        }

        .boxy {
            width: 100px;
            height: 100px;
            position: absolute;
            display: none;
            cursor: pointer;
            border: 1px solid white;
        }
    </style>
</head>

<body >
    <div id="message">Press the box to start!</div>
    <div class="stats">Time: <span id="timer">30</span>s</div>
    <div class="output"></div>

    <script>
        const output = document.querySelector(".output");
        const box = document.createElement("div");
        const boxy = document.createElement("div");
        var time = 31;
        var timeinterval;
        var score = 0;

        box.classList.add("box");
        output.append(box);

        box.style.display = "block";
        box.style.top = "50px";
        box.style.left = "45%";
        box.style.textAlign = "center";
        box.style.lineHeight = "100px";
        box.innerHTML = "Start Game";

        function reset() {
            box.style.display = "block";
            box.style.top = "50px";
            box.style.left = "45%";
            box.style.textAlign = "center";
            box.style.lineHeight = "100px";
            box.innerHTML = "Start Game";
            time = 31;

            document.getElementById("message").innerHTML = "Score: " + score;
            boxy.style.display = "none";
        }

        boxy.addEventListener("click", () => {
            score++;
            console.log(score)
            addBox()
        })

        box.addEventListener("click", () => {
            ulang()
            box.style.display = "none";
            score = 0;
        });

        function ulang() {
            boxy.classList.add("boxy");
            output.append(boxy);
            document.getElementById("message").innerHTML = "Click as Fast as you can"

            addBox()
            box.innerHTML = '';

            if (time > 0) {
                setTimeout("ulang()", 1000);
                time--;
                document.getElementById('timer').innerHTML = time
            } else {
                reset()
            }
        }

        function randomNumbers(max) {
            return Math.floor(Math.random() * max);
        }

        function addBox() {

            const dimX = randomNumbers(50) + 10;
            const dimY = randomNumbers(50) + 10;

            boxy.style.display = "block";
            boxy.style.width = `${dimX}px`;
            boxy.style.height = `${dimY}px`;
            boxy.style.backgroundColor = "#" + Math.random().toString(16).substr(-6);

            // Pastikan posisi tetap di dalam kontainer output
            boxy.style.left = randomNumbers(900) + "px";
            boxy.style.top = randomNumbers(600) + "px";
            boxy.style.borderRadius = randomNumbers(50) + "%";
        }
    </script>
</body>

</html>
