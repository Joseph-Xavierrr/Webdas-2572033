<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList - 2572033</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body {
            padding: 30px;
        }

        .container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px lightgrey;
            margin: auto;
        }

        .input-group {
            margin-bottom: 5px;
        }

        input {
            width: 70%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            border: none;
            color: white;
            border-radius: 4px;
        }

        #btnTambah {
            background: #28a745;
            padding: 8px 12px;
        }

        .danger {
            color: red;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px 20px;
            background: #fff3cd;
            margin-bottom: 5px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #e9ecef;
        }

        button {
            margin-right: 5px;
        }

        .btn-done {
            background-color: #007bff;
        }

        .btn-edit,
        .btn-submit {
            background-color: #ffff00;
            color: black;
        }

        .btn-delete {
            background-color: #dc3545;
        }

        h3 {
            margin-top: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        footer {
            padding: 20px;
            text-align: center;
        }

        .tercoret {
            text-decoration: line-through;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>My To Do List</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Tambah tugas..." maxlength="20">
            <button id="btnTambah">Tambah</button>
        </div>

        <h3>Belum Selesai</h3>
        <ul id="taskList">
        </ul>

        <h3>Sudah Selesai (Riwayat)</h3>
        <table id="completedTable">
            <thead>
                <tr>
                    <th>Nama Tugas</th>
                    <th style="width: 100px;">Aksi</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <footer>
        <strong>&copy; 2026 2572033 - Joseph Xavier Tan. All rights reserved.</strong>
    </footer>

    <script>
        $(document).ready(function () {
            $("#btnTambah").click(function () {
                let tasktext = $("#taskInput").val();
                
                if (tasktext.trim() !== "") {
                    
                    let newLi = $("<li></li>");
                    let taskspan = $("<span></span>").text(tasktext).addClass("task-test");
                    let actionsDiv = $("<div></div>").addClass("task-actions");
                    let btnedit = $("<button>Edit</button>").addClass("btn-edit");
                    let submitbtn = $("<button>Done</button>").addClass("btn-done");

                    actionsDiv.append(btnedit, submitbtn);
                    newLi.append(taskspan, actionsDiv);
                    
                    $("#taskList").append(newLi);
                    $("#taskInput").val("");

                    btnedit.click(function() {
                        if (btnedit.text() === "Edit") {
                            let currenttext = taskspan.text();
                            let inputfield = $("<input type='text'>").val(currenttext).addClass("edit-input").css("width", "120px");

                            submitbtn.hide()
                            taskspan.replaceWith(inputfield);
                            btnedit.text("Save");
                        } else {
                            let updatedtext = newLi.find(".edit-input").val();
                            
                            if (updatedtext.trim() !== "") {
                                taskspan.text(updatedtext);
                                newLi.find(".edit-input").replaceWith(taskspan);
                                btnedit.text("Edit");
                                submitbtn.show()
                            } else {
                                alert("Tugas tidak boleh kosong!")
                            }

                            
                        }
                    });

                    
                    submitbtn.click(function(){
                        let finalTaskText = taskspan.text();
                        let newRow = $("<tr></tr>");
                        let textTd = $("<td></td>").text(finalTaskText).addClass("tercoret");
                        let deleteTd = $("<td></td>");
                        let btndelete = $("<button>Hapus</button>").addClass("btn-delete");
                        
                        btndelete.click(function() {
                            newRow.remove();
                        });
                        
                        deleteTd.append(btndelete);
                        newRow.append(textTd, deleteTd);
                        
                        $("#completedTable tbody").append(newRow);
                        
                        newLi.remove();
                    });
                } else {
                    alert("Tugas tidak boleh kosong!")
                }
            });
        })
    </script>
</body>

</html>
